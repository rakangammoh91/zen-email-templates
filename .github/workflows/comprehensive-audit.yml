name: comprehensive-audit
# Monthly deep audit: flows, campaigns, segments, deliverability, revenue, metrics.
# Runs 1st of month 08:00 Asia/Amman (after monthly-rollup).

on:
  schedule:
    - cron: "0 5 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/agent/requirements.txt

      - name: Run comprehensive audit
        id: audit
        continue-on-error: true
        env:
          KLAVIYO_PRIVATE_API_KEY: ${{ secrets.KLAVIYO_PRIVATE_API_KEY }}
        run: python -m scripts.agent.comprehensive_audit

      - name: Telegram executive summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f /tmp/exec_summary.txt ]; then
            python -m scripts.agent.telegram_notify --text "$(cat /tmp/exec_summary.txt)"
          fi

      - name: Commit audit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audits/ data/segment-snapshots/ || true
          git diff --cached --quiet || git commit -m "chore(audit): comprehensive audit $(date -u +%F)"
          git push
